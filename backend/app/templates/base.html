<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}productiq — Assistant for Your Products{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: "#7B2FBE", accent: "#00C896" } } } }
  </script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
  <header class="border-b border-zinc-200 bg-white">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <span class="text-xl font-bold tracking-tight">productiq</span>
        <span class="text-xs uppercase tracking-widest text-zinc-500">productiq</span>
      </a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="/" class="hover:text-brand">Marketplace</a>
        <a href="/company" class="hover:text-brand">For Companies</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-zinc-200 mt-12">
    <div class="max-w-6xl mx-auto px-6 py-6 text-xs text-zinc-500 flex justify-between">
      <span>Built with Moss + Gemma 3 12B</span>
      <span>PClub × MOSS · 24h hackathon</span>
    </div>
  </footer>
</body>
</html>
